services:

  deepface-api:
    image: deepface-ray-api
    container_name: deepface-ray-api
    hostname: deepface-ray-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - RAY_object_store_memory=1073741824  # 1GB in bytes
      - RAY_spill_dir=/tmp/ray/spill
      - RAY_enable_object_reconstruction=1
      - NUM_WORKERS=1
      - RAY_ADDRESS=${RAY_ADDRESS:-auto}  # Default to local Ray; override to ray-head:6379 when using multi-node
      - MAX_IMAGE_SIZE=1024
    volumes:
      - /tmp/ray:/tmp/ray  # Ray temp files
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    shm_size: "4g"
    networks:
      - ray-network  # Use named network for service communication

  # Optional: Ray head node (for multi-node deployment)
  ray-head:
    image: rayproject/ray:2.8.0-py310
    container_name: ray-head
    hostname: ray-head
    restart: unless-stopped
    command: ray start --head --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265 --block
    ports:
      - "6379:6379"  # Ray client port
      - "8265:8265"  # Ray dashboard
    environment:
      - RAY_DISABLE_IMPORT_WARNING=1
      - RAY_object_store_memory=1073741824  # 1GB in bytes
    volumes:
      - /tmp/ray:/tmp/ray
    networks:
      - ray-network  # Use named network for service communication
    profiles:
      - multi-node  # Only start with --profile multi-node

networks:
  ray-network:
    driver: bridge
